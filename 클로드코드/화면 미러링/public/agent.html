<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에이전트 - 화면 공유</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Malgun Gothic', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #16213e;
    border-radius: 16px;
    padding: 32px;
    width: 100%;
    max-width: 480px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    border: 1px solid #0f3460;
  }
  h1 { font-size: 1.4rem; margin-bottom: 8px; color: #4fc3f7; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 28px; }
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: #0f3460;
    border-radius: 10px;
    margin-bottom: 12px;
    font-size: 0.9rem;
  }
  .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #f44336;
    flex-shrink: 0;
    transition: background 0.3s;
  }
  .dot.green { background: #4caf50; box-shadow: 0 0 8px #4caf50; }
  .dot.yellow { background: #ff9800; box-shadow: 0 0 8px #ff9800; }
  .label { color: #aaa; font-size: 0.8rem; }
  .value { margin-left: auto; font-weight: bold; font-size: 0.85rem; }

  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: bold;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.2s;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, #4fc3f7, #0288d1);
    color: white;
  }
  .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-danger {
    background: linear-gradient(135deg, #ef5350, #c62828);
    color: white;
  }
  .btn-danger:hover { opacity: 0.9; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .preview-wrap {
    margin-top: 20px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid #0f3460;
    display: none;
  }
  .preview-wrap video {
    width: 100%;
    max-height: 200px;
    object-fit: contain;
    background: #000;
    display: block;
  }
  .preview-label {
    background: #0f3460;
    padding: 6px 12px;
    font-size: 0.75rem;
    color: #4fc3f7;
  }

  .log {
    margin-top: 20px;
    background: #0d1b2a;
    border-radius: 8px;
    padding: 12px;
    max-height: 130px;
    overflow-y: auto;
    font-size: 0.75rem;
    color: #78909c;
    font-family: monospace;
  }
  .log div { padding: 2px 0; border-bottom: 1px solid #1a2a3a; }
  .log div:last-child { border: none; }
  .log .ok { color: #4caf50; }
  .log .warn { color: #ff9800; }
  .log .err { color: #ef5350; }

  .notice {
    margin-top: 16px;
    padding: 10px 14px;
    background: #1b3a2a;
    border-left: 3px solid #4caf50;
    border-radius: 6px;
    font-size: 0.78rem;
    color: #a5d6a7;
    line-height: 1.5;
  }
</style>
</head>
<body>
<div class="card">
  <h1>📡 화면 공유 에이전트</h1>
  <p class="subtitle">이 프로그램은 부모님이 화면을 볼 수 있도록 합니다.</p>

  <div class="status-row">
    <div class="dot" id="dotServer"></div>
    <span class="label">서버 연결</span>
    <span class="value" id="statusServer">연결 중...</span>
  </div>
  <div class="status-row">
    <div class="dot" id="dotMonitor"></div>
    <span class="label">부모님 접속</span>
    <span class="value" id="statusMonitor">대기 중</span>
  </div>
  <div class="status-row">
    <div class="dot" id="dotStream"></div>
    <span class="label">화면 공유</span>
    <span class="value" id="statusStream">중지됨</span>
  </div>

  <button class="btn btn-primary" id="btnStart">화면 공유 시작</button>
  <button class="btn btn-danger" id="btnStop" style="display:none">공유 중지</button>

  <div class="preview-wrap" id="previewWrap">
    <div class="preview-label">미리보기 (내 화면)</div>
    <video id="localVideo" autoplay muted playsinline></video>
  </div>

  <div class="log" id="log"></div>

  <div class="notice">
    ℹ️ 이 프로그램은 부모님이 화면을 확인할 수 있도록 합니다.<br>
    화면 공유를 시작하면 부모님이 실시간으로 볼 수 있습니다.
  </div>
</div>

<script>
const SERVER_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}`;
const PC_NAME = '민정후 PC';

let ws = null;
let localStream = null;
let peerConnection = null;
let heartbeatTimer = null;
let monitorConnected = false;

const iceConfig = {
  iceServers: [
    { urls: 'stun:stun.l.google.com:19302' },
    { urls: 'stun:stun1.l.google.com:19302' },
  ]
};

function log(msg, type = '') {
  const el = document.getElementById('log');
  const d = document.createElement('div');
  d.className = type;
  d.textContent = `[${new Date().toLocaleTimeString('ko-KR')}] ${msg}`;
  el.insertBefore(d, el.firstChild);
  if (el.children.length > 50) el.removeChild(el.lastChild);
}

function setDot(id, color) {
  const dot = document.getElementById(id);
  dot.className = 'dot' + (color ? ' ' + color : '');
}

function setStatus(id, text) {
  document.getElementById(id).textContent = text;
}

// ── WebSocket 연결 ──
function connectWS() {
  log('서버에 연결 중...');
  ws = new WebSocket(SERVER_URL);

  ws.onopen = () => {
    log('서버 연결됨', 'ok');
    setDot('dotServer', 'green');
    setStatus('statusServer', '연결됨');

    ws.send(JSON.stringify({
      type: 'agent-register',
      pcName: PC_NAME,
      screenWidth: window.screen.width,
      screenHeight: window.screen.height,
    }));

    startHeartbeat();
  };

  ws.onmessage = async (evt) => {
    const data = JSON.parse(evt.data);

    switch (data.type) {
      case 'monitor-connected':
        monitorConnected = true;
        setDot('dotMonitor', 'green');
        setStatus('statusMonitor', '접속 중');
        log('부모님이 접속했습니다', 'ok');
        break;

      case 'start-stream':
        log('화면 공유 요청 받음', 'ok');
        if (localStream) await createOffer();
        break;

      case 'stop-stream':
        stopSharing();
        break;

      case 'answer':
        if (peerConnection) {
          await peerConnection.setRemoteDescription({ type: 'answer', sdp: data.sdp });
          log('WebRTC 연결 수립됨', 'ok');
        }
        break;

      case 'ice-candidate-monitor':
        if (peerConnection && data.candidate) {
          await peerConnection.addIceCandidate(data.candidate);
        }
        break;

      case 'heartbeat-ack':
        break;
    }
  };

  ws.onclose = () => {
    log('서버 연결 끊김. 재연결 시도...', 'warn');
    setDot('dotServer', '');
    setStatus('statusServer', '연결 끊김');
    setDot('dotMonitor', '');
    setStatus('statusMonitor', '대기 중');
    monitorConnected = false;
    stopHeartbeat();
    setTimeout(connectWS, 3000);
  };

  ws.onerror = (e) => {
    log('WebSocket 오류', 'err');
  };
}

function startHeartbeat() {
  heartbeatTimer = setInterval(() => {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'heartbeat' }));
    }
  }, 5000);
}

function stopHeartbeat() {
  clearInterval(heartbeatTimer);
}

// ── 화면 캡처 시작 ──
document.getElementById('btnStart').addEventListener('click', async () => {
  try {
    log('화면 선택 중...');
    localStream = await navigator.mediaDevices.getDisplayMedia({
      video: { cursor: 'always', frameRate: 15 },
      audio: false,
    });

    document.getElementById('localVideo').srcObject = localStream;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display = 'block';

    setDot('dotStream', 'green');
    setStatus('statusStream', '공유 중');
    log('화면 캡처 시작됨', 'ok');

    // 공유 중지 감지
    localStream.getVideoTracks()[0].addEventListener('ended', stopSharing);

    // 이미 모니터가 있으면 바로 연결
    if (monitorConnected) await createOffer();

    // 주기적 스크린샷도 전송 (WebRTC 연결 전 or 실패 시 대비)
    startScreenshot();

  } catch (e) {
    log('화면 캡처 실패: ' + e.message, 'err');
  }
});

document.getElementById('btnStop').addEventListener('click', stopSharing);

function stopSharing() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
  stopScreenshot();

  document.getElementById('localVideo').srcObject = null;
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('btnStart').style.display = 'block';
  document.getElementById('btnStop').style.display = 'none';
  setDot('dotStream', '');
  setStatus('statusStream', '중지됨');
  log('화면 공유 중지됨', 'warn');
}

// ── WebRTC Offer 생성 ──
async function createOffer() {
  if (peerConnection) { peerConnection.close(); }

  peerConnection = new RTCPeerConnection(iceConfig);

  localStream.getTracks().forEach(track => {
    peerConnection.addTrack(track, localStream);
  });

  peerConnection.onicecandidate = (e) => {
    if (e.candidate && ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'ice-candidate-agent', candidate: e.candidate }));
    }
  };

  peerConnection.onconnectionstatechange = () => {
    log('WebRTC 상태: ' + peerConnection.connectionState);
  };

  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);

  ws.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
  log('화면 스트림 전송 시작', 'ok');
}

// ── 스크린샷 백업 전송 ──
let screenshotTimer = null;
let canvas = document.createElement('canvas');
let ctx = canvas.getContext('2d');

function startScreenshot() {
  screenshotTimer = setInterval(() => {
    if (!localStream || !ws || ws.readyState !== WebSocket.OPEN) return;
    const track = localStream.getVideoTracks()[0];
    if (!track) return;

    // ImageCapture API 사용
    if (typeof ImageCapture !== 'undefined') {
      const capture = new ImageCapture(track);
      capture.grabFrame().then(bitmap => {
        canvas.width = Math.min(bitmap.width, 1280);
        canvas.height = Math.round(bitmap.height * (canvas.width / bitmap.width));
        ctx.drawImage(bitmap, 0, 0, canvas.width, canvas.height);
        const image = canvas.toDataURL('image/jpeg', 0.7);
        ws.send(JSON.stringify({
          type: 'screenshot',
          image,
          timestamp: new Date().toISOString(),
          activeUrl: location.href,
        }));
      }).catch(() => {});
    }
  }, 3000); // 3초마다 스크린샷
}

function stopScreenshot() {
  clearInterval(screenshotTimer);
}

// ── 시작 ──
connectWS();
</script>
</body>
</html>
