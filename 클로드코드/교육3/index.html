<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #FAFAFA;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #212121;
      user-select: none;
    }

    .game-wrapper {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .side-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100px;
    }

    .panel-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      color: #9E9E9E;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    canvas {
      display: block;
      border: 1px solid #E0E0E0;
      border-radius: 4px;
      background: #FAFAFA;
    }

    .stat-group { }

    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: #212121;
      line-height: 1.2;
    }

    .controls {
      margin-top: 4px;
      font-size: 11px;
      color: #9E9E9E;
      line-height: 2;
    }

    .key {
      display: inline-block;
      background: #EEEEEE;
      border-radius: 3px;
      padding: 0 4px;
      font-family: monospace;
      font-size: 10px;
      color: #424242;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">

    <!-- 왼쪽 패널: HOLD -->
    <div class="side-panel">
      <div>
        <div class="panel-label">Hold</div>
        <canvas id="hold" width="100" height="100"></canvas>
      </div>
      <div class="controls">
        <span class="key">←→</span> 이동<br>
        <span class="key">↑</span> 회전<br>
        <span class="key">↓</span> 내리기<br>
        <span class="key">Space</span> 드롭<br>
        <span class="key">C</span> 홀드<br>
        <span class="key">P</span> 일시정지
      </div>
    </div>

    <!-- 게임 보드 -->
    <canvas id="board" width="300" height="600"></canvas>

    <!-- 오른쪽 패널: NEXT + 점수 -->
    <div class="side-panel">
      <div>
        <div class="panel-label">Next</div>
        <canvas id="next" width="100" height="100"></canvas>
      </div>
      <div class="stat-group">
        <div class="panel-label">Score</div>
        <div class="stat-value" id="score">0</div>
      </div>
      <div class="stat-group">
        <div class="panel-label">Level</div>
        <div class="stat-value" id="level">1</div>
      </div>
      <div class="stat-group">
        <div class="panel-label">Best</div>
        <div class="stat-value" id="best">0</div>
      </div>
    </div>

  </div>

  <script>
  // ===== PIECES =====
  function rotate(matrix) {
    const rows = matrix.length;
    const cols = matrix[0].length;
    const result = Array.from({ length: cols }, () => Array(rows).fill(0));
    for (let r = 0; r < rows; r++)
      for (let c = 0; c < cols; c++)
        result[c][rows - 1 - r] = matrix[r][c];
    return result;
  }

  const PIECES = [
    { shape: [[1, 1, 1, 1]],             color: '#29B6F6' }, // I
    { shape: [[1, 1], [1, 1]],           color: '#FFCA28' }, // O
    { shape: [[0, 1, 0], [1, 1, 1]],     color: '#AB47BC' }, // T
    { shape: [[0, 1, 1], [1, 1, 0]],     color: '#66BB6A' }, // S
    { shape: [[1, 1, 0], [0, 1, 1]],     color: '#EF5350' }, // Z
    { shape: [[1, 0, 0], [1, 1, 1]],     color: '#1565C0' }, // J
    { shape: [[0, 0, 1], [1, 1, 1]],     color: '#FF7043' }, // L
  ];

</body>
</html>
