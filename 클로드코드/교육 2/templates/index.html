<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>손글씨 텍스트 인식기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0ff;
      gap: 20px;
      padding: 24px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: .05em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: .82rem;
      color: #6060a0;
    }

    .main-layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    .card-label {
      font-size: .82rem;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: .1em;
      align-self: flex-start;
    }

    #drawCanvas {
      border: 2px solid #3a3a6a;
      border-radius: 12px;
      cursor: crosshair;
      background: #fff;
      touch-action: none;
    }

    /* slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: .82rem;
      color: #9090b0;
      align-self: flex-start;
    }
    input[type=range] {
      -webkit-appearance: none;
      width: 120px; height: 4px;
      border-radius: 2px;
      background: #3a3a6a;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }

    /* buttons */
    .btn-row {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    button {
      flex: 1;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.97); }

    #clearBtn {
      background: #2a2a4a;
      color: #a0a0d0;
      border: 1px solid #3a3a6a;
    }
    #clearBtn:hover { background: #333358; }

    #recognizeBtn {
      background: linear-gradient(135deg, #7c3aed, #2563eb);
      color: #fff;
    }
    #recognizeBtn:hover { opacity: .9; }
    #recognizeBtn:disabled { opacity: .45; cursor: not-allowed; }

    /* result panel */
    .result-card {
      width: 300px;
    }

    #resultText {
      width: 100%;
      height: 180px;
      background: #0f0f1a;
      border: 1px solid #3a3a6a;
      border-radius: 10px;
      color: #e0e0ff;
      font-size: 1rem;
      padding: 12px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.6;
    }

    #copyBtn {
      background: #1e3a2f;
      color: #4ade80;
      border: 1px solid #2d5a42;
      width: 100%;
    }
    #copyBtn:hover { background: #2a5040; }

    #statusMsg {
      font-size: .8rem;
      color: #6060a0;
      min-height: 1.2em;
      text-align: center;
      width: 100%;
    }
    #statusMsg.error { color: #f87171; }
    #statusMsg.success { color: #4ade80; }
    #statusMsg.loading { color: #a78bfa; }
  </style>
</head>
<body>

  <h1>손글씨 텍스트 인식기</h1>
  <p class="subtitle">캔버스에 글씨를 쓰고 인식하기 버튼을 누르세요</p>

  <div class="main-layout">
    <!-- Left: canvas -->
    <div class="card">
      <span class="card-label">그리기</span>
      <canvas id="drawCanvas" width="520" height="360"></canvas>

      <div class="slider-row">
        <span>펜 굵기</span>
        <input type="range" id="penSize" min="2" max="20" value="4"/>
        <span id="penSizeVal">4px</span>
      </div>

      <div class="btn-row">
        <button id="clearBtn">지우기</button>
        <button id="recognizeBtn">인식하기</button>
      </div>
    </div>

    <!-- Right: result -->
    <div class="card result-card">
      <span class="card-label">인식 결과</span>
      <textarea id="resultText" readonly placeholder="인식된 텍스트가 여기에 표시됩니다..."></textarea>
      <button id="copyBtn">복사하기</button>
      <div id="statusMsg"></div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('drawCanvas');
    const ctx = canvas.getContext('2d');
    const penSlider = document.getElementById('penSize');
    const penSizeVal = document.getElementById('penSizeVal');
    const clearBtn = document.getElementById('clearBtn');
    const recognizeBtn = document.getElementById('recognizeBtn');
    const resultText = document.getElementById('resultText');
    const copyBtn = document.getElementById('copyBtn');
    const statusMsg = document.getElementById('statusMsg');

    // Init canvas
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';

    let drawing = false;

    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * scaleX,
        y: (src.clientY - rect.top) * scaleY,
      };
    }

    function startDraw(e) {
      e.preventDefault();
      drawing = true;
      const { x, y } = getPos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
    }

    function draw(e) {
      if (!drawing) return;
      e.preventDefault();
      const { x, y } = getPos(e);
      ctx.lineTo(x, y);
      ctx.stroke();
    }

    function stopDraw(e) {
      if (!drawing) return;
      e.preventDefault();
      drawing = false;
      ctx.beginPath();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDraw);
    canvas.addEventListener('mouseleave', stopDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', stopDraw, { passive: false });

    // Pen size
    penSlider.addEventListener('input', () => {
      ctx.lineWidth = penSlider.value;
      penSizeVal.textContent = penSlider.value + 'px';
    });

    // Clear
    clearBtn.addEventListener('click', () => {
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      resultText.value = '';
      setStatus('', '');
    });

    // Recognize
    recognizeBtn.addEventListener('click', async () => {
      recognizeBtn.disabled = true;
      setStatus('인식 중...', 'loading');

      try {
        const imageData = canvas.toDataURL('image/png');
        const res = await fetch('/recognize', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ image: imageData }),
        });
        const json = await res.json();

        if (!res.ok) {
          setStatus(json.error || '오류가 발생했습니다', 'error');
          resultText.value = '';
        } else {
          resultText.value = json.text;
          setStatus('인식 완료', 'success');
        }
      } catch (err) {
        setStatus('서버에 연결할 수 없습니다', 'error');
      } finally {
        recognizeBtn.disabled = false;
      }
    });

    // Copy
    copyBtn.addEventListener('click', () => {
      if (!resultText.value) return;
      navigator.clipboard.writeText(resultText.value).then(() => {
        setStatus('클립보드에 복사되었습니다', 'success');
      }).catch(() => {
        resultText.select();
        document.execCommand('copy');
        setStatus('복사되었습니다', 'success');
      });
    });

    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = type;
    }
  </script>
</body>
</html>
