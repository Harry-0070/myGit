<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Handwritten Digit Recognition</title>
  <style>
    /* ---------- Reset & base ---------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #e0e0ff;
      gap: 24px;
      padding: 24px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ---------- Canvas card ---------- */
    .card {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .canvas-label {
      font-size: 0.85rem;
      color: #9090b0;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    #drawCanvas {
      border: 2px solid #3a3a6a;
      border-radius: 12px;
      cursor: crosshair;
      background: #ffffff;
      touch-action: none; /* allow touch drawing */
    }

    /* ---------- Brush size slider ---------- */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: #9090b0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      border-radius: 2px;
      background: #3a3a6a;
      outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #a78bfa;
      cursor: pointer;
    }

    /* ---------- Buttons ---------- */
    .btn-row {
      display: flex;
      gap: 12px;
    }

    button {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.15s;
    }
    button:active { transform: scale(0.96); }

    #predictBtn {
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #0f0f1a;
    }
    #predictBtn:hover { opacity: 0.9; }

    #clearBtn {
      background: #2a2a4a;
      color: #c0c0e0;
      border: 1px solid #3a3a6a;
    }
    #clearBtn:hover { background: #3a3a6a; }

    /* ---------- Result panel ---------- */
    #result {
      min-height: 160px;
      width: 340px;
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .placeholder-text {
      color: #5050a0;
      font-size: 0.9rem;
    }

    .digit-display {
      font-size: 5rem;
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .confidence-text {
      font-size: 0.9rem;
      color: #7070c0;
    }

    .confidence-bar-wrap {
      width: 100%;
      background: #2a2a4a;
      border-radius: 6px;
      height: 8px;
      overflow: hidden;
    }
    .confidence-bar {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, #a78bfa, #60a5fa);
      transition: width 0.5s ease;
    }

    /* Top-3 candidates */
    .top3 {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }
    .top3-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #2a2a4a;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.8rem;
      color: #9090c0;
    }
    .top3-item .top3-digit { font-size: 1.3rem; font-weight: 700; color: #c0c0f0; }

    .error-text { color: #f87171; font-size: 0.9rem; }

    /* ---------- Instructions ---------- */
    .instructions {
      font-size: 0.8rem;
      color: #5050a0;
      text-align: center;
      max-width: 340px;
    }
  </style>
</head>
<body>

  <h1>✍️ Digit Recognizer</h1>

  <div class="card">
    <span class="canvas-label">Draw a digit (0 – 9)</span>

    <canvas id="drawCanvas" width="280" height="280"></canvas>

    <!-- Brush size control -->
    <div class="slider-row">
      <span>Brush size:</span>
      <input type="range" id="brushSize" min="8" max="40" value="22" />
      <span id="brushLabel">22</span>
    </div>

    <div class="btn-row">
      <button id="predictBtn">Recognize</button>
      <button id="clearBtn">Clear</button>
    </div>
  </div>

  <!-- Prediction result -->
  <div id="result">
    <span class="placeholder-text">Draw a digit and press Recognize</span>
  </div>

  <p class="instructions">
    Model: SVM (RBF kernel) trained on scikit-learn's built-in digits dataset.<br/>
    Draw clearly and fill the canvas for best results.
  </p>

  <script>
    // ─── Canvas setup ───────────────────────────────────────────────────────────
    const canvas  = document.getElementById("drawCanvas");
    const ctx     = canvas.getContext("2d");
    let isDrawing = false;
    let lastX = 0, lastY = 0;

    // Initialize canvas with white background
    function initCanvas() {
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }
    initCanvas();

    // Brush size slider
    const brushSlider = document.getElementById("brushSize");
    const brushLabel  = document.getElementById("brushLabel");
    brushSlider.addEventListener("input", () => {
      brushLabel.textContent = brushSlider.value;
    });

    // ─── Drawing helpers ─────────────────────────────────────────────────────────
    function getPos(e) {
      const rect = canvas.getBoundingClientRect();
      if (e.touches) {
        return {
          x: e.touches[0].clientX - rect.left,
          y: e.touches[0].clientY - rect.top,
        };
      }
      return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    function startDraw(e) {
      e.preventDefault();
      isDrawing = true;
      const { x, y } = getPos(e);
      lastX = x; lastY = y;
      // Draw a dot on click/tap
      ctx.beginPath();
      ctx.arc(x, y, parseInt(brushSlider.value) / 2, 0, Math.PI * 2);
      ctx.fillStyle = "#111111";
      ctx.fill();
    }

    function draw(e) {
      if (!isDrawing) return;
      e.preventDefault();
      const { x, y } = getPos(e);
      const size = parseInt(brushSlider.value);

      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
      ctx.lineTo(x, y);
      ctx.strokeStyle = "#111111";
      ctx.lineWidth   = size;
      ctx.lineCap     = "round";
      ctx.lineJoin    = "round";
      ctx.stroke();

      lastX = x; lastY = y;
    }

    function stopDraw() { isDrawing = false; }

    // Mouse events
    canvas.addEventListener("mousedown",  startDraw);
    canvas.addEventListener("mousemove",  draw);
    canvas.addEventListener("mouseup",    stopDraw);
    canvas.addEventListener("mouseleave", stopDraw);

    // Touch events (mobile support)
    canvas.addEventListener("touchstart", startDraw, { passive: false });
    canvas.addEventListener("touchmove",  draw,      { passive: false });
    canvas.addEventListener("touchend",   stopDraw);

    // ─── Clear button ─────────────────────────────────────────────────────────────
    document.getElementById("clearBtn").addEventListener("click", () => {
      initCanvas();
      document.getElementById("result").innerHTML =
        '<span class="placeholder-text">Draw a digit and press Recognize</span>';
    });

    // ─── Predict button ───────────────────────────────────────────────────────────
    document.getElementById("predictBtn").addEventListener("click", async () => {
      const imageDataUrl = canvas.toDataURL("image/png");

      const resultDiv = document.getElementById("result");
      resultDiv.innerHTML = '<span class="placeholder-text">Analyzing...</span>';

      try {
        const response = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageDataUrl }),
        });

        const data = await response.json();

        if (data.error) {
          resultDiv.innerHTML = `<span class="error-text">⚠️ ${data.error}</span>`;
          return;
        }

        // Build top-3 HTML
        const top3Html = data.top3
          .map(
            (item, i) => `
              <div class="top3-item">
                <span class="top3-digit">${item.digit}</span>
                <span>${item.prob}%</span>
              </div>`
          )
          .join("");

        resultDiv.innerHTML = `
          <div class="digit-display">${data.digit}</div>
          <span class="confidence-text">Confidence: <strong>${data.confidence}%</strong></span>
          <div class="confidence-bar-wrap">
            <div class="confidence-bar" style="width: ${data.confidence}%"></div>
          </div>
          <span style="font-size:0.78rem; color:#5050a0; margin-top:4px;">Top 3 candidates</span>
          <div class="top3">${top3Html}</div>
        `;
      } catch (err) {
        resultDiv.innerHTML =
          '<span class="error-text">⚠️ Server error. Please try again.</span>';
        console.error(err);
      }
    });
  </script>
</body>
</html>
